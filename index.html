<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王广成 - 个人主页</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        :root {
            --bg-color: #f9fafb;
            --text-color: #1f2937;
            --accent-color: #2563eb;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* 头部信息 */
        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #111827;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #6b7280;
        }

        /* 简介 */
        section {
            margin-bottom: 30px;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
        }

        p {
            margin-bottom: 10px;
            color: #374151;
        }

        /* 链接列表 */
        ul {
            list-style: none;
        }

        li {
            margin-bottom: 10px;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.2s;
        }

        a:hover {
            color: #1d4ed8;
            text-decoration: underline;
        }

        /* 标签样式 */
        .tag {
            display: inline-block;
            background: #eff6ff;
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-right: 5px;
        }

        /* 底部版权 */
        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.85rem;
            color: #9ca3af;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>王广成</h1>
            <p class="subtitle">浙江 · 高中生</p>
        </header>

        <section>
            <h2>关于我</h2>
            <p>你好，我是王广成。</p>
            <p>热衷于 Web 开发与开源技术。</p>
        </section>

        <section>
            <h2>项目经历</h2>
            <ul>
                <li>
                    <a href="https://github.com/Wangren-Academy" target="_blank">
                        <strong>Wangren-Academy</strong>
                    </a>
                    <span class="tag">Organization</span>
                    <p>我在 GitHub 上创建并管理的组织，用于分享技术和协作开发。</p>
                </li>
            </ul>
        </section>

        <section>
            <h2>联系方式</h2>
            <ul>
                <li>📧 <a href="mailto:Guang-Dawang@outlook.com">Guang-Dawang@outlook.com</a></li>
                <li>💻 <a href="https://github.com/guangdawang" target="_blank">github.com/guangdawang</a></li>
            </ul>
        </section>

        <footer>
            &copy; 2026 Guangcheng Wang. Built with simple HTML & CSS.
        </footer>
    </div>

</body>

</html>
