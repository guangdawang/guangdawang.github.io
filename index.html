<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王广成 - 个人主页</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23E67E22'/%3E%3Ctext x='50' y='70' font-size='70' text-anchor='middle' fill='%235D4037' font-family='system-ui, sans-serif' font-weight='600'%3E%E7%8E%8B%3C/text%3E%3C/svg%3E">
    <style>
        :root {
            --bg-color: #FFF3E0;      /* 暖米白，土/火 */
            --text-color: #3E2723;    /* 深棕，土 */
            --accent-color: #E67E22;  /* 橙红，火 */
            --card-bg: #FFF8F0;       /* 极浅米黄，土/火 */
            --border-color: #FFE0B5;  /* 淡橙，火/土 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        /* 头部信息 */
        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #5D4037;  /* 深棕，保持可读性 */
        }

        .subtitle {
            font-size: 1.1rem;
            color: #8B5A2B;  /* 棕色 */
        }

        /* 简介 */
        section {
            margin-bottom: 30px;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
            color: #5D4037;
        }

        p {
            margin-bottom: 10px;
            color: #4E3B31;
        }

        /* 链接列表 */
        ul {
            list-style: none;
        }

        li {
            margin-bottom: 10px;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.2s;
        }

        a:hover {
            color: #D35400;
            text-decoration: underline;
        }

        /* 标签样式 */
        .tag {
            display: inline-block;
            background: #FFE0B5;
            color: #D35400;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-right: 5px;
        }

        /* 底部版权 */
        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.85rem;
            color: #8B5A2B;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>王广成</h1>
            <p class="subtitle">浙江 · 高中生</p>
        </header>

        <section>
            <h2>关于我</h2>
            <p>我是王广成。</p>
        </section>

        <section>
            <h2>项目经历</h2>
            <ul>
                <li>
                    <a href="https://github.com/Wangren-Academy" target="_blank">
                        <strong>Wangren-Academy</strong>
                    </a>
                    <span class="tag">Organization</span>
                    <p>我在 GitHub 上创建并管理的组织，用于分享技术和协作开发。</p>
                </li>
            </ul>
        </section>

        <section>
            <h2>联系方式</h2>
            <ul>
                <li>📧 <a href="mailto:Guang-Dawang@outlook.com">Guang-Dawang@outlook.com</a></li>
                <li>💻 <a href="https://github.com/guangdawang" target="_blank">github.com/guangdawang</a></li>
            </ul>
        </section>

        <footer>
            &copy; 2026 Guangcheng Wang. Built with simple HTML & CSS.
        </footer>
    </div>

</body>

</html>
